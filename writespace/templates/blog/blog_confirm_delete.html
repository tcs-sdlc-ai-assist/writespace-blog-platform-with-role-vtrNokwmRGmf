{% extends "base.html" %}

{% block title %}Delete Post — WriteSpace{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="mb-6">
        <a href="{% url 'blog_detail' post.id %}" class="inline-flex items-center text-sm font-medium text-gray-500 hover:text-blue-600 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
            </svg>
            Back to Post
        </a>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8 sm:p-10">
        <div class="text-center">
            <div class="text-5xl mb-4">🗑️</div>
            <h1 class="text-2xl font-bold text-gray-900 mb-2">Delete Post</h1>
            <p class="text-gray-600 mb-8">Are you sure you want to delete "<strong>{{ post.title }}</strong>"? This action cannot be undone.</p>

            <div class="flex items-center justify-center gap-3">
                <a href="{% url 'blog_detail' post.id %}" class="inline-flex items-center px-5 py-2.5 rounded-lg text-sm font-medium text-gray-700 bg-white border border-gray-300 hover:bg-gray-50 transition-colors">
                    Cancel
                </a>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="inline-flex items-center px-5 py-2.5 rounded-lg text-sm font-semibold text-white bg-red-600 hover:bg-red-700 transition-colors">
                        Delete Post
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
