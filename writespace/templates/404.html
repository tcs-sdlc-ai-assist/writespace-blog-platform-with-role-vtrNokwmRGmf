{% extends "base.html" %}

{% block title %}Page Not Found — WriteSpace{% endblock %}

{% block content %}
<div class="flex items-center justify-center py-20 px-4 sm:px-6 lg:px-8">
    <div class="text-center max-w-md">
        <div class="text-6xl mb-6">🔍</div>
        <h1 class="text-4xl font-bold text-gray-900 mb-4">404</h1>
        <h2 class="text-xl font-semibold text-gray-700 mb-4">Page Not Found</h2>
        <p class="text-gray-600 mb-8 leading-relaxed">Sorry, the page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
        <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
            <a href="{% url 'landing' %}" class="inline-flex items-center px-6 py-3 rounded-lg text-base font-semibold text-white bg-blue-600 hover:bg-blue-700 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z" />
                </svg>
                Go Home
            </a>
            <a href="{% url 'blog_list' %}" class="inline-flex items-center px-6 py-3 rounded-lg text-base font-semibold text-gray-700 bg-white border border-gray-300 hover:bg-gray-50 transition-colors">
                Browse Blogs
            </a>
        </div>
    </div>
</div>
{% endblock %}
